name: Safari Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Clone, setup and run
        run: |
          git clone https://github.com/maxyuuyyyu77171-uff/bookish-dollop.git
          cd bookish-dollop
          pip install requests
          chmod +x safari
          python monitor.py
